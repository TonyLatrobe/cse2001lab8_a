apiVersion: v1
kind: Service
metadata:
  name: hash-api
  namespace: staging
  labels:
    app: hash-api
    team: platform
spec:
  selector:
    app: hash-api
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP

k8s/Jenkins-staging-sa.yaml
 
# Grants the jenkins ServiceAccount permission to manage resources
# in the staging namespace and to create the namespace itself.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jenkins-deploy
rules:
  - apiGroups: [""]
    resources: ["namespaces", "services", "pods", "configmaps",
                "endpoints", "resourcequotas"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]